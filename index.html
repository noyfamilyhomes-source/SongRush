<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SongRush</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#111;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .container{
            max-width:500px;
            padding:30px;
        }

        h1{
            font-size:64px;
            color:#9d5cff;
            margin-bottom:10px;
        }

        h2{
            font-size:32px;
            margin-bottom:40px;
        }

        button{
            background:#9d5cff;
            color:white;
            border:none;
            padding:18px 40px;
            font-size:22px;
            border-radius:12px;
            cursor:pointer;
        }

        button:hover{
            background:#8140ff;
        }

        p{
            opacity:.8;
            margin-top:30px;
        }
    </style>

</head>

<body>

<div class="container">

<h1>🎸 SongRush</h1>

<h2>You Pick.<br>We Play.</h2>

<button>
Join Tonight's Show
</button>

<p>No app required.</p>

</div>

</body>
</html>
